<div class="vcv-page vc-container">

    <!-- ── هيدر ── -->
    <div class="vcv-header">
        <div class="vcv-header-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
            </svg>
        </div>
        <div>
            <h1 class="vcv-title" data-lang="vcv_title">مستخرج الصوت من الفيديو</h1>
            <p class="vcv-sub" data-lang="vcv_desc">استخراج تراك الصوت من أي فيديو وتحويله إلى WAV أو MP3 — محلياً وبدون إنترنت.</p>
        </div>
    </div>

    <!-- ── منطقة الرفع ── -->
    <div class="vcv-section">
        <div class="vcv-section-label" data-lang="vcv_label_file">ملف الفيديو</div>
        <div class="vcv-drop-zone" id="vc-drop-zone" onclick="document.getElementById('vc-video-input').click()">
            <div class="vcv-drop-icon-wrap">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="23 7 16 12 23 17 23 7"></polygon>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                </svg>
            </div>
            <span class="vcv-drop-text" id="vc-drop-label" data-lang="vcv_drop">اضغط هنا لاختيار ملف الفيديو</span>
            <span class="vcv-drop-hint" data-lang="vcv_hint">يدعم MP4, WebM, MOV وغيرها</span>
            <input type="file" id="vc-video-input" accept="video/*" style="display:none">
        </div>
    </div>

    <!-- ── شريط التقدم ── -->
    <div class="vcv-status-box" id="vc-status-box">
        <div class="vcv-status-msg" id="vc-status-msg" data-lang="vcv_status">جاري المعالجة...</div>
        <div class="vcv-bar-bg">
            <div class="vcv-bar-fill" id="vc-bar-fill"></div>
        </div>
        <div class="vcv-status-pct" id="vc-status-pct">0%</div>
    </div>

    <!-- ── الإحصائيات ── -->
    <div class="vcv-stats-row" id="vc-stats-area">
        <div class="vcv-stat-card">
            <span class="vcv-stat-label" data-lang="vcv_stat_vid">حجم الفيديو</span>
            <span class="vcv-stat-val vcv-val-del" id="vc-video-size">0 MB</span>
        </div>
        <div class="vcv-stat-card">
            <span class="vcv-stat-label" data-lang="vcv_stat_aud">حجم الصوت المستخرج</span>
            <span class="vcv-stat-val vcv-val-add" id="vc-audio-size">0 MB</span>
        </div>
    </div>

    <!-- ── تشغيل المعاينة ── -->
    <div class="vcv-section" id="vc-preview-box" style="display:none;">
        <button id="vc-play-btn" class="vcv-btn vcv-btn-play">
            <svg id="vc-play-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <span id="vc-play-text" data-lang="vcv_btn_play">تشغيل المعاينة</span>
        </button>
        <!-- Timeline -->
        <div class="vcv-timeline" id="vc-progress-wrapper">
            <span id="vc-current-time" class="vcv-time">00:00</span>
            <div class="vcv-progress-track" id="vc-progress-track">
                <div class="vcv-progress-fill" id="vc-progress-fill"></div>
                <div class="vcv-progress-thumb" id="vc-progress-thumb"></div>
            </div>
            <span id="vc-total-time" class="vcv-time">00:00</span>
        </div>
    </div>

    <!-- ── التحميل ── -->
    <div id="vc-download-wrap" style="display:none;">
        <div class="vcv-section vcv-section-dd">
            <div class="vcv-section-label" data-lang="vcv_label_format">صيغة التصدير</div>
            <div id="vcv-dd-format"></div>
            <input type="hidden" id="vcv-format" value="wav">
        </div>
        <button class="vcv-btn vcv-btn-success" id="vc-download-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span id="vcv-btn-label" data-lang="vcv_btn_down">تحميل ملف الصوت (WAV)</span>
        </button>
    </div>

</div>
