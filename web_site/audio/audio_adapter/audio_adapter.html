<div class="adp-page">

    <!-- ── هيدر الصفحة ── -->
    <div class="adp-header">
        <div class="adp-header-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12h4l2-9 5 18 4-10h5"/>
            </svg>
        </div>
        <div>
            <h1 class="adp-title" data-lang="adp_title">محول الصيغ الصوتية</h1>
            <p class="adp-sub" data-lang="adp_desc">تحويل هندسي للملفات الصوتية بين مختلف الصيغ محلياً.</p>
        </div>
    </div>

    <!-- ── قسم رفع الملف ── -->
    <div class="adp-section">
        <div class="adp-section-label" data-lang="adp_section_file">الملف الصوتي</div>
        <div class="adp-card adp-drop-zone" id="file-input-container" onclick="document.getElementById('audioFile').click()">
            <div class="adp-drop-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </div>
            <span class="adp-drop-text" id="file-details" data-lang="adp_drop">اسحب الملف الصوتي هنا أو اضغط للاختيار</span>
            <input type="file" id="audioFile" accept="audio/*, video/*" style="display:none;">
        </div>
    </div>

    <!-- ── قسم صيغة التصدير ── -->
    <div class="adp-section">
        <div class="adp-section-label" data-lang="adp_format_label">صيغة التصدير</div>
        <div class="adp-card adp-format-card">
            <div id="adp-dd-format"></div>
            <input type="hidden" id="target-format" value="MP3">
        </div>
    </div>

    <!-- ── زر التحويل ── -->
    <div class="adp-section">
        <button id="action-btn" class="adp-btn adp-btn-primary" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            <span data-lang="adp_btn_start">بدء التحويل والمعالجة</span>
        </button>
    </div>

    <!-- ── شريط الحالة ── -->
    <div id="status-box" class="adp-section adp-status" style="display:none;">
        <div class="adp-card">
            <div class="adp-status-text" id="status-text" data-lang="adp_status_wait">بانتظار بدء العملية...</div>
            <div class="adp-progress-track">
                <div id="p-bar" class="adp-progress-fill" style="width:0%"></div>
            </div>
        </div>
    </div>

    <!-- ── زر التحميل ── -->
    <div id="download-wrapper" class="adp-section" style="display:none;">
        <a id="download-link" class="adp-btn adp-btn-success" style="text-decoration:none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span data-lang="adp_btn_download">تحميل الملف المحول</span>
        </a>
    </div>

</div>
