name: Extract Arsenal

on:
  push:
    branches: [main]

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip website
        run: unzip web_site.zip -d .

      - name: Remove zip
        run: rm web_site.zip

      - name: Push extracted files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extract Arsenal files"
          git push
