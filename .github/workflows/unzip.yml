name: Unzip Web Site

on:
  push:
    paths:
      - 'web_site.zip'
  workflow_dispatch: # هذا السطر يسمح لك بتشغيل الأكشن يدوياً في أي وقت

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip file
        run: |
          unzip -o web_site.zip -d .
          rm web_site.zip

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Auto-unzipped web_site.zip via GitHub Actions"
          git push
          
